<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Finder</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    .card {
        background: #fff;
        width: 100%;
        max-width: 380px;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        margin-bottom: 20px;
        animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
        margin-bottom: 10px;
        color: #333;
    }

    p {
        font-size: 14px;
        color: #666;
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }

    #output {
        margin-top: 15px;
        font-size: 15px;
        color: #333;
        text-align: left;
    }

    .label {
        font-weight: bold;
    }

    .map-container {
        width: 100%;
        max-width: 380px;
        height: 0;
        overflow: hidden;
        border-radius: 15px;
        transition: all 0.5s ease;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .map-container.active {
        height: 300px;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 15px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="card">
    <h2>📍 Find My Location</h2>
    <p>Click below to get your current location</p>

    <button onclick="getLocation()">Get Location</button>

    <div id="output"></div>
</div>

<div id="mapContainer" class="map-container"></div>

<script>
function getLocation() {
    const output = document.getElementById("output");
    const mapContainer = document.getElementById("mapContainer");

    if (!navigator.geolocation) {
        output.innerHTML = "Geolocation not supported.";
        return;
    }

    output.innerHTML = "⏳ Fetching location...";

    navigator.geolocation.getCurrentPosition(
        function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // Call reverse geocoding API
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                .then(res => res.json())
                .then(data => {
                    const address = data.display_name;

                    output.innerHTML = `
                        <div><span class="label">Latitude:</span> ${lat}</div>
                        <div><span class="label">Longitude:</span> ${lon}</div>
                        <br>
                        <div><span class="label">📍 Address:</span><br>${address}</div>
                    `;
                })
                .catch(() => {
                    output.innerHTML = `
                        <div><b>Latitude:</b> ${lat}</div>
                        <div><b>Longitude:</b> ${lon}</div>
                        <br>
                        ❌ Unable to fetch address
                    `;
                });

            // Show map automatically
            mapContainer.innerHTML = `
                <iframe 
                    src="https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed">
                </iframe>
            `;
            mapContainer.classList.add("active");
        },
        function(error) {
            output.innerHTML = "❌ " + error.message;
        },
        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    );
}
</script>

</body>
</html>
